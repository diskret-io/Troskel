name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Tier 1 — static validation
  # Butane config + shellcheck. No privileges or KVM needed.
  # Fast: completes in under a minute. Runs on every push and PR.
  # ---------------------------------------------------------------------------
  validate:
    name: Tier 1 — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: make image

      - name: Run validation
        run: make validate

  # ---------------------------------------------------------------------------
  # Tier 2 — build pipeline
  # debootstrap + scanner image build. Needs --privileged inside the container.
  # Runs on push to main and on PRs. Takes ~10 minutes (debootstrap is slow).
  # ---------------------------------------------------------------------------
  build:
    name: Tier 2 — build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: make image

      - name: Run build pipeline
        run: make build

  # ---------------------------------------------------------------------------
  # Tier 3 — scan test
  # Firecracker microVM boot + EICAR scan. Needs KVM.
  # GitHub's ubuntu-latest runners expose /dev/kvm via nested virtualisation.
  # Runs on push to main only (not on every PR — it takes ~5 additional
  # minutes and KVM availability on PR runners is not guaranteed).
  # ---------------------------------------------------------------------------
  scan:
    name: Tier 3 — scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # KVM is available on ubuntu-latest but the group permission needs
      # a nudge. This is the standard GitHub Actions workaround.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build container image
        run: make image

      - name: Run scan test
        run: make scan