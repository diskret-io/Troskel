name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Tier 1 — static validation
  # Butane config + shellcheck. No privileges or KVM needed.
  # Fast: completes in under a minute. Runs on every push and PR.
  # ---------------------------------------------------------------------------
  validate:
    name: Tier 1 — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: make image

      - name: Run validation
        run: make validate

  # ---------------------------------------------------------------------------
  # Tier 2 + 3 (container path) — build pipeline and scan test via Docker
  # Runs in a single job so the Docker volume with build artefacts (scanner
  # rootfs, signatures, kernel) persists from make build into make scan.
  # Separate jobs run on separate runners and cannot share volumes.
  #
  # Needs --privileged for debootstrap and mkfs.ext4 (Tier 2), and KVM for
  # Firecracker (Tier 3). Both are available on ubuntu-latest runners.
  #
  # Runs on push to main only — KVM availability on PR runners is not
  # guaranteed, and the full build+scan takes ~20 minutes.
  # ---------------------------------------------------------------------------
  build-and-scan-container:
    name: Tier 2+3 — build and scan (container)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # KVM is available on ubuntu-latest but the group permission needs
      # a nudge. This is the standard GitHub Actions workaround.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build container image
        run: make image

      - name: Run build pipeline
        run: make build

      - name: Run scan test
        run: make scan

  # ---------------------------------------------------------------------------
  # Tier 2 + 3 (host path) — build pipeline and scan test directly on runner
  # Exercises the native Debian/Ubuntu path — the same path an admin would
  # use on a dedicated build station — without Docker. Uses
  # prepare-build-machine.sh to install tooling, then runs test-build.sh and
  # test-scan.sh directly as root.
  #
  # This job validates that the scripts work correctly outside a container,
  # catches regressions that only appear on a native host (chroot behaviour,
  # PATH assumptions, freshclam config, etc.), and gives coverage for the
  # --host flag of troskel-build.sh.
  #
  # Runs on push to main only — same reasoning as the container path.
  # ---------------------------------------------------------------------------
  build-and-scan-host:
    name: Tier 2+3 — build and scan (host)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # prepare-build-machine.sh installs debootstrap, freshclam, unzip,
      # shellcheck, Firecracker, Butane, and LOKI-RS directly on the runner.
      # Docker is already present on ubuntu-latest runners but the script
      # checks for it gracefully rather than requiring it.
      - name: Install build tools
        run: sudo bash scripts/prepare-build-machine.sh

      - name: Run build pipeline (host)
        run: sudo bash tests/test-build.sh

      - name: Run scan test (host)
        run: sudo bash tests/test-scan.sh